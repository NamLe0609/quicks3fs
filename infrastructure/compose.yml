services:
  nginx:
    image: nginx:stable-alpine3.23-perl
    hostname: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs:ro
    network_mode: host
    depends_on:
      - minio

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    hostname: caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    network_mode: host
    depends_on:
      - minio
    restart: unless-stopped

  haproxy:
    image: haproxy:3.3.7
    hostname: haproxy
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/etc/ssl/certs:ro
    network_mode: host
    depends_on:
      - minio
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: [ "server", "--console-address", ":10000", "/data" ]
    volumes:
      - data-minio:/data
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: beak-lamp-blind
    healthcheck:
        test: ["CMD", "mc", "ready", "local"]
        interval: 5s
        timeout: 1s
        retries: 5
    network_mode: host

  minio-buckets:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 1;
      /usr/bin/mc alias set dockerminio http://minio:9000 root beak-lamp-blind;
      exit 0;
      "

volumes:
    data-minio:
      driver: local
      driver_opts:
        type: tmpfs
        device: tmpfs
        o: size=30g
    caddy_data:
    caddy_config:
